---
# =============================================================================
# Role: talos_bootstrap_vps — Apply configs, bootstrap, kubeconfig
#
# Runs on localhost. VPS nodes have public IPs, so talosctl reaches them directly.
# Configs were generated by talos_generate → env_dir.
# All commands run locally, all files stay in env_dir.
#
# Required variables:
#   - env_dir, cluster_name, cluster_endpoint, talos_version
#   - controlplane_nodes, worker_nodes, all_nodes
#   (each node has both `host` for connections and `ip` for Talos config)
# =============================================================================

# =============================================================================
# Pre-flight: verify CA fingerprint in talosconfig matches secrets.yaml.
# This catches the most dangerous scenario: secrets regenerated after bootstrap.
# =============================================================================
- name: Check if CA fingerprint file exists (pre-flight)
  ansible.builtin.stat:
    path: "{{ env_dir }}/.ca-fingerprint"
  register: _preflight_fp_stat

- name: Read persisted CA fingerprint (pre-flight)
  ansible.builtin.slurp:
    src: "{{ env_dir }}/.ca-fingerprint"
  register: _preflight_fp_file
  when: _preflight_fp_stat.stat.exists

- name: Read CA fingerprint from talosconfig (pre-flight)
  ansible.builtin.shell: >-
    python3 -c
    "import yaml,base64,subprocess,tempfile,os;
    tc=yaml.safe_load(open('{{ env_dir }}/talosconfig'));
    ctx=list(tc['contexts'].values())[0];
    ca=base64.b64decode(ctx['ca']);
    tmp=tempfile.NamedTemporaryFile(suffix='.pem',delete=False);
    tmp.write(ca);tmp.close();
    r=subprocess.run(['openssl','x509','-noout','-fingerprint','-in',tmp.name],capture_output=True,text=True);
    os.unlink(tmp.name);
    print(r.stdout.strip())"
  register: _preflight_tc_fp
  changed_when: false
  when: _preflight_fp_stat.stat.exists

- name: Fail immediately on CA fingerprint mismatch (pre-flight)
  ansible.builtin.fail:
    msg: >-
      PRE-FLIGHT FAILED: CA fingerprint mismatch between secrets.yaml and talosconfig.
      Expected (from .ca-fingerprint): {{ (_preflight_fp_file.content | b64decode).strip() }}
      Got in talosconfig:              {{ _preflight_tc_fp.stdout }}
      Do NOT apply configs. Your secrets.yaml and talosconfig are out of sync.
      This means talosconfig was regenerated from a different secrets.yaml than
      what was used to bootstrap. Fix: run talos_generate again with the correct
      secrets.yaml, or re-bootstrap the cluster from scratch.
  when:
    - _preflight_fp_stat.stat.exists
    - (_preflight_fp_file.content | b64decode).strip() != _preflight_tc_fp.stdout

# =============================================================================
# Wait for Talos API, detect mode, apply configs
# =============================================================================
- name: Wait for Talos API on all nodes (port 50000)
  ansible.builtin.wait_for:
    host: "{{ item.host }}"
    port: 50000
    timeout: 300
    delay: 10
  loop: "{{ all_nodes }}"
  loop_control:
    label: "{{ item.name }}"

# Check if node is already configured (authenticated talosctl works)
- name: Check if first CP node is already configured
  ansible.builtin.command:
    cmd: >-
      talosctl version
        --talosconfig {{ env_dir }}/talosconfig
        --nodes {{ controlplane_nodes[0].host }}
        --endpoints {{ controlplane_nodes[0].host }}
  register: _node_configured_check
  failed_when: false
  changed_when: false

- name: Set node configuration state
  ansible.builtin.set_fact:
    _nodes_in_maintenance: "{{ _node_configured_check.rc != 0 }}"

# --- Maintenance mode path (first-time apply with --insecure) ---
- name: Apply config to control plane nodes (maintenance mode)
  ansible.builtin.command:
    cmd: >-
      talosctl apply-config
        --insecure
        --nodes {{ item.host }}
        --endpoints {{ item.host }}
        --config-patch @{{ env_dir }}/patch-{{ item.name }}.yaml
        --file {{ env_dir }}/controlplane.yaml
  loop: "{{ controlplane_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  when: _nodes_in_maintenance

- name: Apply config to worker nodes (maintenance mode)
  ansible.builtin.command:
    cmd: >-
      talosctl apply-config
        --insecure
        --nodes {{ item.host }}
        --endpoints {{ item.host }}
        --config-patch @{{ env_dir }}/patch-{{ item.name }}.yaml
        --file {{ env_dir }}/worker.yaml
  loop: "{{ worker_nodes | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: _nodes_in_maintenance and (worker_nodes | default([])) | length > 0

# --- Already-configured path (re-apply with auth) ---
- name: Apply config to control plane nodes (authenticated)
  ansible.builtin.command:
    cmd: >-
      talosctl apply-config
        --talosconfig {{ env_dir }}/talosconfig
        --nodes {{ item.host }}
        --endpoints {{ item.host }}
        --config-patch @{{ env_dir }}/patch-{{ item.name }}.yaml
        --file {{ env_dir }}/controlplane.yaml
  loop: "{{ controlplane_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  when: not _nodes_in_maintenance

- name: Apply config to worker nodes (authenticated)
  ansible.builtin.command:
    cmd: >-
      talosctl apply-config
        --talosconfig {{ env_dir }}/talosconfig
        --nodes {{ item.host }}
        --endpoints {{ item.host }}
        --config-patch @{{ env_dir }}/patch-{{ item.name }}.yaml
        --file {{ env_dir }}/worker.yaml
  loop: "{{ worker_nodes | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: not _nodes_in_maintenance and (worker_nodes | default([])) | length > 0

# =============================================================================
# Wait for Talos API (after potential reboot from maintenance), bootstrap
# =============================================================================
- name: Wait for nodes to boot and Talos API to be ready
  ansible.builtin.wait_for:
    host: "{{ item.host }}"
    port: 50000
    timeout: 300
    delay: "{{ 30 if _nodes_in_maintenance else 5 }}"
  loop: "{{ all_nodes }}"
  loop_control:
    label: "{{ item.name }}"

- name: Bootstrap etcd on first control plane
  ansible.builtin.command:
    cmd: >-
      talosctl bootstrap
        --talosconfig {{ env_dir }}/talosconfig
        --nodes {{ controlplane_nodes[0].host }}
        --endpoints {{ controlplane_nodes[0].host }}
  register: bootstrap_result
  failed_when:
    - bootstrap_result.rc != 0
    - "'AlreadyExists' not in bootstrap_result.stderr"

- name: Wait for Kubernetes API (port 6443)
  ansible.builtin.wait_for:
    host: "{{ cluster_vip | default(controlplane_nodes[0].host) }}"
    port: 6443
    timeout: 300
    delay: 15

- name: Generate kubeconfig
  ansible.builtin.command:
    cmd: >-
      talosctl kubeconfig {{ env_dir }}/kubeconfig
        --talosconfig {{ env_dir }}/talosconfig
        --nodes {{ controlplane_nodes[0].host }}
        --endpoints {{ cluster_vip | default(controlplane_nodes[0].host) }}
        --force

- name: Verify kubeconfig is non-empty
  ansible.builtin.stat:
    path: "{{ env_dir }}/kubeconfig"
  register: _kubeconfig_stat

- name: Fail if kubeconfig is empty (auth failure)
  ansible.builtin.fail:
    msg: >-
      kubeconfig at {{ env_dir }}/kubeconfig is empty (0 bytes).
      This means talosctl kubeconfig failed silently — likely a CA mismatch
      between talosconfig and the running cluster. Check that secrets.yaml
      matches the cluster that was bootstrapped (compare .ca-fingerprint).
  when: _kubeconfig_stat.stat.size == 0

# =============================================================================
# Verify CA fingerprint matches what talos_generate persisted.
# Catches the case where secrets.yaml was regenerated after bootstrap.
# =============================================================================
- name: Check if CA fingerprint file exists
  ansible.builtin.stat:
    path: "{{ env_dir }}/.ca-fingerprint"
  register: _fp_stat

- name: Read persisted CA fingerprint
  ansible.builtin.slurp:
    src: "{{ env_dir }}/.ca-fingerprint"
  register: _fp_file
  when: _fp_stat.stat.exists

- name: Read CA fingerprint from live talosconfig
  ansible.builtin.shell: >-
    python3 -c
    "import yaml,base64,subprocess,tempfile,os;
    tc=yaml.safe_load(open('{{ env_dir }}/talosconfig'));
    ctx=list(tc['contexts'].values())[0];
    ca=base64.b64decode(ctx['ca']);
    tmp=tempfile.NamedTemporaryFile(suffix='.pem',delete=False);
    tmp.write(ca);tmp.close();
    r=subprocess.run(['openssl','x509','-noout','-fingerprint','-in',tmp.name],capture_output=True,text=True);
    os.unlink(tmp.name);
    print(r.stdout.strip())"
  register: _tc_fingerprint
  changed_when: false
  when: _fp_stat.stat.exists

- name: Fail if CA fingerprint mismatch detected
  ansible.builtin.fail:
    msg: >-
      CA FINGERPRINT MISMATCH DETECTED.
      secrets.yaml CA: {{ (_fp_file.content | b64decode).strip() }}
      talosconfig CA:  {{ _tc_fingerprint.stdout }}
      This means talosconfig was regenerated from different secrets than
      what this cluster was bootstrapped with. Do NOT proceed.
      Recovery: restore original secrets.yaml or re-bootstrap the cluster.
  when:
    - _fp_stat.stat.exists
    - (_fp_file.content | b64decode).strip() != _tc_fingerprint.stdout

# Set kubeconfig_path for cilium role (runs next on same host)
- name: Set kubeconfig path for subsequent roles
  ansible.builtin.set_fact:
    kubeconfig_path: "{{ env_dir }}/kubeconfig"
